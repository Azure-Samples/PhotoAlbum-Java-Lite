# Smoke test profile — H2 in-memory database + Azurite blob emulator
# This profile is used by the Layer 2 smoke test runner (run-layer2-tests.ps1 / .sh).
# It replaces Managed Identity auth with local emulator connection strings.
# IMPORTANT: This file is added by the smoke-test auth commit and reverted afterward.

# H2 in Oracle compatibility mode (avoids Oracle XE Docker image requirement)
spring.datasource.url=jdbc:h2:mem:smokedb;MODE=Oracle;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# File upload
app.file-upload.max-file-size-bytes=10485760
app.file-upload.allowed-mime-types=image/jpeg,image/png,image/gif,image/webp
app.file-upload.max-files-per-upload=10
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Azurite emulator — replaces DefaultAzureCredential / Managed Identity
azure.storage.blob.account-name=devstoreaccount1
azure.storage.blob.container-name=smoke-photos
azure.storage.blob.connection-string=DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://localhost:10000/devstoreaccount1;

# Logging
logging.level.com.photoalbum=INFO
logging.level.org.springframework.web=WARN
