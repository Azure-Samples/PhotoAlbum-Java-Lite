# H2 in Oracle compatibility mode for Layer 1 integration tests
spring.datasource.url=jdbc:h2:mem:layer1testdb;MODE=Oracle;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

app.file-upload.max-file-size-bytes=10485760
app.file-upload.allowed-mime-types=image/jpeg,image/png,image/gif,image/webp
app.file-upload.max-files-per-upload=10

# Azurite account name (connection string injected via @DynamicPropertySource)
azure.storage.blob.account-name=devstoreaccount1
azure.storage.blob.container-name=test-photos

logging.level.com.photoalbum=DEBUG
logging.level.org.springframework.web=DEBUG
